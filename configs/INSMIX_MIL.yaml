General:
    MODEL_NAME: INSMIX_MIL
    seed: 2024
    num_classes: 2
    num_epochs: 50
    device: 0
    num_workers: 4
    best_model_metric: macro_auc
    earlystop: 
        use: True
        patience: 10
        metric: macro_auc

Dataset:
    DATASET_NAME: TCGA_LUAD
    # to use train-val-test, open dataset_csv_dir
    # to use k-fold train-val/k-fold train-val then test, open dataset_root_dir
    
    dataset_csv_path: datasets/Stanford_Dataset.csv
    # dataset_root_dir: datasets/TCGA_LUAD/TCGA_LUAD_CLAM_uni
    feature_extractor: uni
    
    balanced_sampler:
        use: False
        replacement: True

Logs:
    log_root_dir: logs/CLAM

Model:
    in_dim: 1024
    L: 512
    D: 128
    dropout: 0.25
    act: relu
    optimizer:
        which: adam
        adam_config:
            lr: 0.0002
            weight_decay: 0.00001
    criterion: bce  # Use BCE for soft labels
    scheduler:
        warmup: 2
        which: cosine
        cosine_config:
            T_max: 20
            eta_min: 0.00001

Mixup:
    method: insmix  # Instance-level Mixup
    alpha: 1.0
    prob: 0.5

